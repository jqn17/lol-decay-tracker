<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>LoL Decay Tracker</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); text-align: center; }
        input { padding: 10px; border-radius: 4px; border: none; margin: 5px; width: 150px; }
        button { padding: 10px 20px; border-radius: 4px; border: none; background: #0070f3; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0051ad; }
        #result { margin-top: 20px; font-size: 1.2rem; color: #00ff88; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Decay Tracker</h1>
        <input type="text" id="name" placeholder="Nick (np. Sieun)">
        <input type="text" id="tag" placeholder="Tag (np. KR1)">
        <br>
        <button onclick="checkDecay()">Sprawdź Bank</button>
        <div id="result"></div>
    </div>

    <script>
        async function checkDecay() {
            const name = document.getElementById('name').value;
            const tag = document.getElementById('tag').value;
            const resDiv = document.getElementById('result');
            resDiv.innerText = "Ładowanie...";

            try {
                // Zapytanie do Twojego własnego API na tym samym serwerze
                const response = await fetch(`/api/check?name=${encodeURIComponent(name)}&tag=${encodeURIComponent(tag)}`);
                const data = await response.json();
                
                if(data.error) {
                    resDiv.innerText = "Błąd: " + data.error;
                } else {
                    resDiv.innerText = data.rank + " | " + data.decay;
                }
            } catch (e) {
                resDiv.innerText = "Błąd połączenia z serwerem.";
            }
        }
    </script>
</body>
</html>
